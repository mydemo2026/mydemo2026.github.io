<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>联系我们 | 工业零件外贸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
</head>
<body class="font-sans text-steel-900 bg-white antialiased">
  <header class="border-b border-steel-200 bg-white/95 backdrop-blur sticky top-0 z-50">
    <nav class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="index.html" class="text-xl font-semibold tracking-tight text-steel-900">Industrial Parts</a>
      <ul class="flex items-center gap-8 text-sm text-steel-600">
        <li><a href="index.html" class="hover:text-steel-900 transition">首页</a></li>
        <li><a href="products.html" class="hover:text-steel-900 transition">产品目录</a></li>
        <li><a href="contact.html" class="font-medium text-steel-900 border-b-2 border-steel-900 pb-0.5">联系我们</a></li>
      </ul>
    </nav>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-16">
    <div class="max-w-xl">
      <p class="text-sm uppercase tracking-widest text-steel-500 mb-2">Contact</p>
      <h1 class="text-3xl md:text-4xl font-semibold tracking-tight text-steel-900">联系我们</h1>
      <p class="mt-4 text-steel-600">请填写以下表单，我们会尽快回复您的询盘或报价需求。</p>
    </div>

    <div class="mt-16 grid lg:grid-cols-3 gap-16">
      <form class="lg:col-span-2 space-y-6" action="#" method="post">
        <div class="grid sm:grid-cols-2 gap-6">
          <div>
            <label for="name" class="block text-sm font-medium text-steel-700 mb-2">姓名 / Name</label>
            <input type="text" id="name" name="name" required
              class="w-full px-4 py-3 border border-steel-200 rounded focus:outline-none focus:ring-2 focus:ring-steel-400 focus:border-transparent"
              placeholder="您的姓名" />
          </div>
          <div>
            <label for="company" class="block text-sm font-medium text-steel-700 mb-2">公司 / Company</label>
            <input type="text" id="company" name="company"
              class="w-full px-4 py-3 border border-steel-200 rounded focus:outline-none focus:ring-2 focus:ring-steel-400 focus:border-transparent"
              placeholder="公司名称" />
          </div>
        </div>
        <div>
          <label for="email" class="block text-sm font-medium text-steel-700 mb-2">邮箱 / Email</label>
          <input type="email" id="email" name="email" required
            class="w-full px-4 py-3 border border-steel-200 rounded focus:outline-none focus:ring-2 focus:ring-steel-400 focus:border-transparent"
            placeholder="your@email.com" />
        </div>
        <div>
          <label for="subject" class="block text-sm font-medium text-steel-700 mb-2">主题 / Subject</label>
          <select id="subject" name="subject"
            class="w-full px-4 py-3 border border-steel-200 rounded focus:outline-none focus:ring-2 focus:ring-steel-400 focus:border-transparent bg-white">
            <option value="quote">询价 / Quote</option>
            <option value="sample">样品请求 / Sample</option>
            <option value="cooperation">合作咨询 / Cooperation</option>
            <option value="other">其他 / Other</option>
          </select>
        </div>
        <div>
          <label for="message" class="block text-sm font-medium text-steel-700 mb-2">留言 / Message</label>
          <textarea id="message" name="message" rows="5" required
            class="w-full px-4 py-3 border border-steel-200 rounded focus:outline-none focus:ring-2 focus:ring-steel-400 focus:border-transparent resize-y"
            placeholder="请描述您的产品需求、规格或问题..."></textarea>
        </div>
        <button type="submit"
          class="w-full sm:w-auto px-8 py-3 bg-steel-900 text-white text-sm font-medium rounded hover:bg-steel-800 transition focus:outline-none focus:ring-2 focus:ring-steel-500 focus:ring-offset-2">
          发送 / Send
        </button>
      </form>

      <aside class="space-y-8">
        <div>
          <h3 class="text-sm font-medium text-steel-500 uppercase tracking-wider mb-3">联系方式</h3>
          <ul class="space-y-3 text-steel-700">
            <li>邮箱：contact@example.com</li>
            <li>电话：+86 xxx xxxx xxxx</li>
          </ul>
        </div>
        <div>
          <h3 class="text-sm font-medium text-steel-500 uppercase tracking-wider mb-3">办公地址</h3>
          <p class="text-steel-700">中国 · 工业区 / 园区地址</p>
        </div>
        <div>
          <h3 class="text-sm font-medium text-steel-500 uppercase tracking-wider mb-3">工作时间</h3>
          <p class="text-steel-700">周一至周五 9:00–18:00（GMT+8）</p>
        </div>
      </aside>
    </div>
  </main>

  <footer class="border-t border-steel-200 bg-steel-900 text-steel-300 mt-20">
    <div class="max-w-5xl mx-auto px-6 py-12 flex flex-col sm:flex-row justify-between items-center gap-4 text-sm">
      <span>© 2026 Industrial Parts. All rights reserved.</span>
      <ul class="flex gap-6">
        <li><a href="index.html" class="hover:text-white transition">首页</a></li>
        <li><a href="products.html" class="hover:text-white transition">产品目录</a></li>
        <li><a href="contact.html" class="hover:text-white transition">联系我们</a></li>
      </ul>
    </div>
  </footer>
</body>
</html>
