<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>联系我们 | 工业零件外贸</title>
  <span data-i18n-page-title="contact.title" class="hidden" aria-hidden="true"></span>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
  <script src="js/i18n.js" defer></script>
</head>
<body class="font-sans text-steel-900 bg-white antialiased">
  <header class="border-b border-steel-200 bg-white/95 backdrop-blur sticky top-0 z-50">
    <nav class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="index.html" class="text-xl font-semibold tracking-tight text-steel-900">Industrial Parts</a>
      <ul class="flex items-center gap-8 text-sm text-steel-600">
        <li><a href="index.html" class="hover:text-steel-900 transition" data-i18n="nav.home">首页</a></li>
        <li><a href="products.html" class="hover:text-steel-900 transition" data-i18n="nav.products">产品目录</a></li>
        <li><a href="contact.html" class="font-medium text-steel-900 border-b-2 border-steel-900 pb-0.5" data-i18n="nav.contact">联系我们</a></li>
        <li class="lang-switch flex items-center gap-1">
          <button type="button" data-lang="zh" class="px-1 text-steel-500 hover:text-steel-700 transition">中文</button>
          <span class="text-steel-300">|</span>
          <button type="button" data-lang="en" class="px-1 text-steel-500 hover:text-steel-700 transition">EN</button>
        </li>
      </ul>
    </nav>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-16">
    <div class="max-w-xl">
      <p class="text-sm uppercase tracking-widest text-steel-500 mb-2" data-i18n="contact.label">Contact</p>
      <h1 class="text-3xl md:text-4xl font-semibold tracking-tight text-steel-900" data-i18n="contact.heading">联系我们</h1>
      <p class="mt-4 text-steel-600" data-i18n="contact.intro">请填写以下表单，我们会尽快回复您的询盘或报价需求。</p>
    </div>

    <div class="mt-16 grid lg:grid-cols-3 gap-16">
      <!-- FormSubmit.co 免费无月度限制，请将下方 action 中的邮箱改为你的真实邮箱，首次使用需在该邮箱中确认激活 -->
      <form class="lg:col-span-2 space-y-6" action="https://formsubmit.co/lwqdyx@icloud.com" method="POST">
        <input type="hidden" name="_next" value="https://mydemo2026.github.io/thank-you.html">
        <input type="hidden" name="_subject" value="mydemo2026网站联系表单">
        <input type="hidden" name="_template" value="table">
        <div class="grid sm:grid-cols-2 gap-6">
          <div>
            <label for="name" class="block text-sm font-medium text-steel-700 mb-2" data-i18n="contact.name">姓名 / Name</label>
            <input type="text" id="name" name="name" required
              class="w-full px-4 py-3 border border-steel-200 rounded focus:outline-none focus:ring-2 focus:ring-steel-400 focus:border-transparent"
              data-i18n-placeholder="contact.namePlaceholder" placeholder="您的姓名" />
          </div>
          <div>
            <label for="company" class="block text-sm font-medium text-steel-700 mb-2" data-i18n="contact.company">公司 / Company</label>
            <input type="text" id="company" name="company"
              class="w-full px-4 py-3 border border-steel-200 rounded focus:outline-none focus:ring-2 focus:ring-steel-400 focus:border-transparent"
              data-i18n-placeholder="contact.companyPlaceholder" placeholder="公司名称" />
          </div>
        </div>
        <div>
          <label for="email" class="block text-sm font-medium text-steel-700 mb-2" data-i18n="contact.email">邮箱 / Email</label>
          <input type="email" id="email" name="email" required
            class="w-full px-4 py-3 border border-steel-200 rounded focus:outline-none focus:ring-2 focus:ring-steel-400 focus:border-transparent"
            data-i18n-placeholder="contact.emailPlaceholder" placeholder="your@email.com" />
        </div>
        <div>
          <label for="subject" class="block text-sm font-medium text-steel-700 mb-2" data-i18n="contact.subject">主题 / Subject</label>
          <select id="subject" name="subject"
            class="w-full px-4 py-3 border border-steel-200 rounded focus:outline-none focus:ring-2 focus:ring-steel-400 focus:border-transparent bg-white">
            <option value="quote" data-i18n="contact.subjectQuote">询价 / Quote</option>
            <option value="sample" data-i18n="contact.subjectSample">样品请求 / Sample</option>
            <option value="cooperation" data-i18n="contact.subjectCoop">合作咨询 / Cooperation</option>
            <option value="other" data-i18n="contact.subjectOther">其他 / Other</option>
          </select>
        </div>
        <div>
          <label for="message" class="block text-sm font-medium text-steel-700 mb-2" data-i18n="contact.message">留言 / Message</label>
          <textarea id="message" name="message" rows="5" required
            class="w-full px-4 py-3 border border-steel-200 rounded focus:outline-none focus:ring-2 focus:ring-steel-400 focus:border-transparent resize-y"
            data-i18n-placeholder="contact.messagePlaceholder" placeholder="请描述您的产品需求、规格或问题..."></textarea>
        </div>
        <button type="submit"
          class="w-full sm:w-auto px-8 py-3 bg-steel-900 text-white text-sm font-medium rounded hover:bg-steel-800 transition focus:outline-none focus:ring-2 focus:ring-steel-500 focus:ring-offset-2"
          data-i18n="contact.send">
          发送 / Send
        </button>
      </form>

      <aside class="space-y-8">
        <div>
          <h3 class="text-sm font-medium text-steel-500 uppercase tracking-wider mb-3" data-i18n="contact.contactInfo">联系方式</h3>
          <ul class="space-y-3 text-steel-700">
            <li><span data-i18n="contact.emailLabel">邮箱</span>：lwqdyx@icloud.com</li>
            <li><span data-i18n="contact.phoneLabel">电话</span>：+86 xxx xxxx xxxx</li>
          </ul>
        </div>
        <div>
          <h3 class="text-sm font-medium text-steel-500 uppercase tracking-wider mb-3" data-i18n="contact.address">办公地址</h3>
          <p class="text-steel-700" data-i18n="contact.addressText">中国 · 工业区 / 园区地址</p>
        </div>
        <div>
          <h3 class="text-sm font-medium text-steel-500 uppercase tracking-wider mb-3" data-i18n="contact.hours">工作时间</h3>
          <p class="text-steel-700" data-i18n="contact.hoursText">周一至周五 9:00–18:00（GMT+8）</p>
        </div>
      </aside>
    </div>
  </main>

  <footer class="border-t border-steel-200 bg-steel-900 text-steel-300 mt-20">
    <div class="max-w-5xl mx-auto px-6 py-12 flex flex-col sm:flex-row justify-between items-center gap-4 text-sm">
      <span data-i18n="footer.copyright">© 2026 Industrial Parts. All rights reserved.</span>
      <ul class="flex gap-6">
        <li><a href="index.html" class="hover:text-white transition" data-i18n="nav.home">首页</a></li>
        <li><a href="products.html" class="hover:text-white transition" data-i18n="nav.products">产品目录</a></li>
        <li><a href="contact.html" class="hover:text-white transition" data-i18n="nav.contact">联系我们</a></li>
      </ul>
    </div>
  </footer>
</body>
</html>
